<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FantaBeach" />
    <meta name="theme-color" content="#2D5C4F" />
    <meta name="description" content="Fantasy Beach Volley FIPAV 2026" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <title>FantaBeach 2026</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0; width: 100%; height: 100%;
        overflow-x: hidden;
        -webkit-text-size-adjust: 100%;
        touch-action: pan-y;
        -webkit-tap-highlight-color: transparent;
      }
      #root { width: 100%; min-height: 100vh; min-height: -webkit-fill-available; }
      #splash {
        position: fixed; inset: 0; background: #F5EFE3;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999; transition: opacity 0.3s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
    </style>
  </head>
  <body>
    <div id="splash">
      <svg width="80" height="80" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs><clipPath id="sc"><circle cx="50" cy="50" r="46"/></clipPath></defs>
        <circle cx="50" cy="50" r="46" fill="#2A5C4E"/>
        <path d="M 4 48 C 15 10 40 8 55 20 C 65 28 80 20 96 22 L 96 4 L 4 4 Z" fill="#F5A623" clip-path="url(#sc)"/>
        <path d="M 4 62 C 18 30 42 28 58 40 C 70 50 84 36 96 38 L 96 4 C 80 2 65 12 55 4 C 40 -4 15 0 4 38 Z" fill="#E8541A" clip-path="url(#sc)"/>
        <path d="M 4 74 C 20 50 44 46 60 58 C 72 66 86 54 96 56 L 96 38 C 84 36 70 50 58 40 C 42 28 18 30 4 62 Z" fill="#C0392B" clip-path="url(#sc)"/>
      </svg>
      <div style="margin-top:16px;font-family:Georgia,serif;font-weight:bold;font-size:24px;color:#2D5C4F;">
        Fanta<span style="color:#E8541A;">Beach</span>
      </div>
      <div style="margin-top:8px;font-family:Georgia,serif;font-size:13px;color:#6B7B74;">Caricamento...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const s = document.getElementById('splash');
          if (s) s.classList.add('hidden');
        }, 800);
      });
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((reg) => {
            console.log('[PWA] SW registrato:', reg.scope);
            document.addEventListener('visibilitychange', () => {
              if (document.visibilityState === 'visible') reg.update();
            });
          }).catch(err => console.warn('[PWA] SW fallito:', err));
        });
      }
    </script>
  </body>
</html>
