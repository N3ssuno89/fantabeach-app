[build]
  base = "fantabeach"
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Chiude il mercato Market ogni giovedì alle 23:00 ora italiana
[functions.close-market]
  schedule = "0 21 * * 4"

# Reminder mercato chiude oggi — giovedì alle 10:00 ora italiana
[functions.market-reminder]
  schedule = "0 8 * * 4"

# ─── FIVB: aggiornamento dati da fivbeach.com ───────────────────

# Risultati partite: ogni ora al minuto :15 (lavora solo sui tornei "ongoing")
[functions.fivb-matches]
  schedule = "15 * * * *"

# Stato tornei (upcoming/ongoing/finished): ogni 6 ore al minuto :00
# Gira PRIMA di fivb-matches (:00 vs :15) così matches legge stati freschi
[functions.fivb-tournaments]
  schedule = "0 */6 * * *"

# Iscrizioni (coppie + coach): ogni giorno 04:30 UTC (06:30 Rome)
[functions.fivb-entries]
  schedule = "30 4 * * *"

# Ranking (costo atleti): ogni giorno 04:45 UTC (06:45 Rome)
[functions.fivb-rankings]
  schedule = "45 4 * * *"
# Allineamento anagrafica: ogni giorno 05:00 UTC (07:00 Rome), dopo entries/rankings
[functions.fivb-players]
  schedule = "0 5 * * *"


[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
